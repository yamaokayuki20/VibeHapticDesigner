<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>触覚・音響デザインツール (Perlin Haptics POC)</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
    .control-group { margin-bottom: 15px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
    label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem;}
    input[type="range"] { width: 100%; cursor: pointer; }
    .buttons { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 15px; font-size: 1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
    #playBtn { background: #4CAF50; color: white; }
    #playBtn.playing { background: #f44336; }
    #recordBtn { background: #2196F3; color: white; }
    #recordBtn.recording { background: #ff9800; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <h1>Haptic/Audio Generator POC</h1>

  <div class="control-group">
    <label><span>すべすべ (0)</span> <span>ザラザラ (1)</span></label>
    <input type="range" id="roughness" min="0" max="1" step="0.01" value="0.5">
  </div>
  
  <div class="control-group">
    <label><span>固体 (0)</span> <span>液体 (1)</span></label>
    <input type="range" id="state" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="control-group">
    <label><span>硬い (0)</span> <span>柔らかい (1)</span></label>
    <input type="range" id="hardness" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="control-group">
    <label><span>重い (0)</span> <span>軽い (1)</span></label>
    <input type="range" id="weight" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="control-group">
    <label><span>サラサラ (0)</span> <span>ネバネバ (1)</span></label>
    <input type="range" id="viscosity" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="control-group">
    <label><span>速度 (遅い 0)</span> <span>速度 (速い 1)</span></label>
    <input type="range" id="velocity" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="control-group">
    <label><span>加速度 (減速 0)</span> <span>加速度 (加速 1)</span></label>
    <input type="range" id="acceleration" min="0" max="1" step="0.01" value="0.5">
  </div>

  <div class="buttons">
    <button id="playBtn">Play / 再生</button>
    <button id="recordBtn" disabled>Record (WAV) / 録音開始</button>
  </div>

  <script>
    let audioCtx;
    let noiseSource, lfo, gainNode, filter, lowShelf;
    let isPlaying = false;
    let mediaRecorder, chunks = [];

    // ノイズバッファの生成（簡易的なホワイトノイズから構築）
    function createNoiseBuffer(ctx) {
      const bufferSize = ctx.sampleRate * 2; // 2秒ループ
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      return buffer;
    }

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // 録音用のノード
      const dest = audioCtx.createMediaStreamDestination();
      mediaRecorder = new MediaRecorder(dest.stream);
      
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = e => {
        const blob = new Blob(chunks, { 'type' : 'audio/wav' }); // ブラウザによってはwebmになります
        chunks = [];
        const audioURL = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = audioURL;
        a.download = 'haptic_audio.wav';
        document.body.appendChild(a);
        a.click();
      };
      
      document.getElementById('recordBtn').disabled = false;

      // マスターゲイン
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;
      
      // フィルタリング
      filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      
      lowShelf = audioCtx.createBiquadFilter();
      lowShelf.type = 'lowshelf';
      lowShelf.frequency.value = 150;

      // 接続
      filter.connect(lowShelf);
      lowShelf.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      gainNode.connect(dest); // 録音用にも分岐

      updateParams();
    }

    function startSound() {
      noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = createNoiseBuffer(audioCtx);
      noiseSource.loop = true;

      lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      
      lfo.connect(lfoGain);
      lfoGain.connect(gainNode.gain);

      noiseSource.connect(filter);
      
      noiseSource.start();
      lfo.start();
      
      // 滑らかなフェードイン
      gainNode.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.1);
      
      // パラメータをLFO等に適用
      window.lfoRef = lfo;
      window.lfoGainRef = lfoGain;
      updateParams();
    }

    function stopSound() {
      gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
      setTimeout(() => {
        if(noiseSource) noiseSource.stop();
        if(lfo) lfo.stop();
      }, 200);
    }

    function updateParams() {
      if (!audioCtx) return;

      const val = id => parseFloat(document.getElementById(id).value);
      
      const roughness = val('roughness');
      const state = val('state');
      const hardness = val('hardness');
      const weight = val('weight');
      const viscosity = val('viscosity');
      const velocity = val('velocity');
      const accel = val('acceleration');

      // ザラザラ度：ローパスフィルタのカットオフ
      filter.frequency.value = 200 + (roughness * 5000);
      
      // 硬さ：フィルタのレゾナンス（Q値）
      filter.Q.value = (1 - hardness) * 10;

      // 重さ：Lowshelfのゲイン（低音強調）
      lowShelf.gain.value = (1 - weight) * 15; // 0=重い=低音ブースト, 1=軽い

      if (window.lfoRef) {
        // 固体・液体：LFOの波形。固体(0)はパルス的、液体(1)はサイン波
        window.lfoRef.type = state < 0.5 ? 'square' : 'sine';
        
        // サラサラ・ネバネバ：LFOの周波数と変調の深さ
        // ネバネバ(1)ほど遅く、深く。サラサラ(0)ほど速く、浅く。
        const speed = 10 - (viscosity * 8); // 2Hz ~ 10Hz
        window.lfoRef.frequency.value = speed;
        window.lfoGainRef.gain.value = 0.2 + (viscosity * 0.5);
      }

      // 速度・加速度：再生レートへの影響（ピッチの変化）
      if (noiseSource) {
        let baseRate = 0.5 + velocity;
        // 加速度によるピッチベンドのシミュレーション（簡易的）
        let targetRate = baseRate + ((accel - 0.5) * 1.0);
        noiseSource.playbackRate.setTargetAtTime(targetRate, audioCtx.currentTime, 0.5);
      }
    }

    // イベントリスナー
    const sliders = ['roughness', 'state', 'hardness', 'weight', 'viscosity', 'velocity', 'acceleration'];
    sliders.forEach(id => {
      document.getElementById(id).addEventListener('input', updateParams);
    });

    const playBtn = document.getElementById('playBtn');
    playBtn.addEventListener('click', () => {
      initAudio();
      if (isPlaying) {
        stopSound();
        playBtn.textContent = 'Play / 再生';
        playBtn.classList.remove('playing');
      } else {
        startSound();
        playBtn.textContent = 'Stop / 停止';
        playBtn.classList.add('playing');
      }
      isPlaying = !isPlaying;
    });

    const recordBtn = document.getElementById('recordBtn');
    recordBtn.addEventListener('click', () => {
      if (mediaRecorder.state === 'inactive') {
        mediaRecorder.start();
        recordBtn.textContent = 'Stop Recording / 録音停止＆保存';
        recordBtn.classList.add('recording');
      } else {
        mediaRecorder.stop();
        recordBtn.textContent = 'Record (WAV) / 録音開始';
        recordBtn.classList.remove('recording');
      }
    });
  </script>
</body>
</html>
